    { q: "What are eigenvalues and eigenvectors? How do they relate to PCA?",
      a: "For matrix A: <strong>Av = λv</strong> where v is eigenvector (direction) and λ is eigenvalue (scale).<br><br>Eigenvectors are directions unchanged by transformation A; eigenvalues tell how much they stretch/compress.<br><br><strong>PCA (Principal Component Analysis)</strong>:<br>1. Compute covariance matrix of data<br>2. Find eigenvectors (principal components = directions of maximum variance)<br>3. Sort by eigenvalues (largest = most variance captured)<br>4. Project data onto top-k eigenvectors<br><br>Result: k-dimensional representation that preserves maximum variance. Used for dimensionality reduction, visualization, noise removal.",
      mk: "Eigenvector = direction unchanged by transformation | PCA = project onto top eigenvectors of covariance matrix | Explained variance ratio = eigenvalue/Σeigenvalues" },
    { q: "What is entropy and cross-entropy loss in machine learning?",
      a: "<strong>Entropy</strong>: H(p) = −Σ p(x) log p(x). Measures uncertainty/impurity in a distribution. High entropy = high uncertainty (uniform distribution). Zero entropy = certainty. Used in decision trees (information gain = entropy before − weighted entropy after split).<br><br><strong>Cross-entropy</strong>: H(p,q) = −Σ p(x) log q(x). Measures how different two distributions are. Standard loss for classification: p = true labels (one-hot), q = model predictions (softmax).<br><br>Minimizing cross-entropy = maximizing log-likelihood = making model predictions close to true distribution.",
      mk: "Entropy = uncertainty | Cross-entropy loss = standard for classification | Lower cross-entropy = better predictions" },
    { q: "What is gradient in calculus and how is it used in backpropagation?",
      a: "<strong>Gradient</strong>: vector of partial derivatives ∇f = [∂f/∂w1, ∂f/∂w2,...]. Points in direction of steepest ascent. Magnitude = rate of change.<br><br>In backprop: use <strong>chain rule</strong> to compute ∂L/∂w for each weight:<br>∂L/∂W1 = ∂L/∂a3 × ∂a3/∂z3 × ∂z3/∂a2 × ... × ∂z1/∂W1<br><br>Chain rule decomposes complex derivatives into products of simpler ones. Enables efficient gradient computation in O(n) instead of O(n²).<br><br>Weights updated: w = w − lr × gradient (move in direction of steepest descent).",
      mk: "Gradient = direction of steepest ascent | Backprop uses chain rule | Move opposite to gradient = descend loss" },
    { q: "What is a normal distribution? What is the 68-95-99.7 rule?",
      a: "Normal (Gaussian) distribution: symmetric bell curve defined by mean μ and standard deviation σ. Notation: X ~ N(μ, σ²).<br><br><strong>68-95-99.7 rule</strong>:<br>• 68% of data falls within 1σ of mean<br>• 95% within 2σ<br>• 99.7% within 3σ<br><br>Standard normal: μ=0, σ=1. Z-score: z = (x−μ)/σ tells how many standard deviations from mean.<br><br>Important in ML: weight initialization (Normal init), noise in data, many natural phenomena. Central Limit Theorem ensures many processes converge to normal.",
      mk: "N(μ,σ²) | 68-95-99.7 rule | Z-score = (x-μ)/σ | Central Limit Theorem → normal distribution" },
    { q: "What is the dot product of two vectors? What is its significance in ML?",
      a: "<strong>a · b = Σ ai×bi = |a||b|cos(θ)</strong><br><br>Geometric: measures similarity between vectors. Same direction = large positive. Perpendicular = 0. Opposite = negative.<br><br>In ML:<br>• <strong>Cosine similarity</strong> = (a·b)/(|a||b|) — measures embedding similarity (search, NLP)<br>• Neural network linear transformation = dot product: z = W·x + b<br>• Attention score = Q·K^T — similarity between query and key tokens<br>• Similarity search in vector databases uses dot product or cosine similarity",
      mk: "Dot product = a·b = |a||b|cos(θ) | Perpendicular = 0 | Cosine similarity = dot product normalized | Foundation of attention" },
    { q: "What is conditional probability and the multiplication rule?",
      a: "<strong>Conditional probability</strong>: P(A|B) = P(A∩B) / P(B). Probability of A given B has occurred.<br><br><strong>Multiplication rule</strong>: P(A∩B) = P(A|B) × P(B) = P(B|A) × P(A)<br><br>If A and B are <strong>independent</strong>: P(A|B) = P(A), P(A∩B) = P(A)×P(B)<br><br>Applications in ML:<br>• Naive Bayes assumes feature independence: P(features|class) = ΠP(fi|class)<br>• Hidden Markov Models use conditional probabilities for sequence modeling<br>• Bayesian inference updates probabilities as evidence arrives",
      mk: "P(A|B) = P(A∩B)/P(B) | Independent: P(A∩B)=P(A)P(B) | Naive Bayes assumes feature independence given class" },
    { q: "What is Type I and Type II error in hypothesis testing?",
      a: "<strong>Type I error (False Positive)</strong>: rejecting the null hypothesis when it's actually TRUE. False alarm. Probability = α (significance level, typically 0.05).<br><br><strong>Type II error (False Negative)</strong>: failing to reject the null when it's actually FALSE. Missed detection. Probability = β. Power = 1−β.<br><br>Medical context: Type I = healthy person diagnosed with disease. Type II = sick person diagnosed as healthy (usually more dangerous).<br><br>In ML: Type I error = false positive = flagging innocent spam. Type II error = false negative = missing real spam. Use precision/recall to control these trade-offs.",
      mk: "Type I = False Positive (α=0.05) | Type II = False Negative (β) | Power = 1-β | Medical: Type II usually worse" },
    { q: "What is the p-value? How is it interpreted?",
      a: "<strong>p-value</strong>: probability of observing test statistic at least as extreme as observed, <em>assuming the null hypothesis is true</em>.<br><br>Interpretation: if p &lt; 0.05 (α), reject null hypothesis (result is statistically significant). If p ≥ 0.05, fail to reject (not enough evidence).<br><br>Common misconception: p-value is NOT the probability that the null hypothesis is true. It's the probability of seeing data this extreme IF the null were true.<br><br>Small p-value = data is unlikely under null = evidence against null. Large sample sizes can make trivially small effects statistically significant.",
      mk: "p-value = P(data | H0 is true) | p<0.05 → reject H0 | p-value is NOT P(H0 is true) | Large n → everything significant" }
  ]},
  { id: 't9', label: 'Analytical / IQ', color: '#d1d5db', bg: 'rgba(156,163,175,0.08)', icon: '🧩',
    pill: 'Warm-up', pillColor: '#9ca3af', qs: [
    { q: "3 boxes: one with 2 apples, one with 2 oranges, one mixed. All labels are WRONG. Pick one fruit from one box to label all correctly.",
      a: "Pick from the box labeled 'Mixed' (Apple & Orange).<br><br>Since ALL labels are wrong, this box CANNOT be mixed — it must contain either 2 apples or 2 oranges.<br><br>• If you pick an apple → this box has 2 apples.<br>The box labeled 'Oranges' can't have oranges (wrong label) and can't have apples (that's the first box) → it must be mixed.<br>The box labeled 'Apples' must have oranges.<br><br>• If you pick an orange → same logic applies symmetrically.<br><br>One pick correctly identifies all three boxes.",
      mk: "Key insight: since ALL labels wrong, box labeled 'Mixed' CANNOT be mixed | One pick resolves all ambiguity" },
    { q: "You have a 3L jug and a 5L jug. Measure exactly 4 liters.",
      a: "Step 1: Fill the 5L jug completely.<br>Step 2: Pour from 5L into 3L until 3L is full. → 5L now has 2L, 3L is full.<br>Step 3: Empty the 3L jug.<br>Step 4: Pour the 2L from 5L into 3L. → 3L has 2L, 5L is empty.<br>Step 5: Fill the 5L jug completely again.<br>Step 6: Pour from 5L into 3L until 3L is full (needs 1L more). → 5L now has exactly 4L. Done!<br><br>Alternatively: Fill 3L → pour into 5L → fill 3L again → pour into 5L (takes 2L more) → 3L has 1L left → empty 5L → pour 1L → fill 3L → pour into 5L → 4L.",
      mk: "Work systematically: fill, pour, empty | Target = 5 - (3-2) = 4 | Water puzzle = classic BFS state search problem" },
    { q: "A snail climbs a 10-foot pole. Climbs 3 feet per day, slides back 2 feet per night. How many days to reach the top?",
      a: "Net progress per day/night cycle = 3 − 2 = 1 foot.<br><br>After 7 complete cycles: snail is at 7 feet.<br>Day 8: climbs 3 feet → reaches 10 feet during the day.<br>Since it reaches the top during the day, it doesn't slide back that night.<br><br><strong>Answer: 8 days.</strong><br><br>Common wrong answer: 10 days (forgetting that once it reaches the top, there's no sliding back). Always check if the goal is reached mid-cycle.",
      mk: "Day 8: at 7 + 3 = 10 → done! | Don't apply night sliding when goal is reached during day | Answer: 8 days (not 10)" },
    { q: "If all Bloops are Razzies and all Razzies are Lazzies, are all Bloops definitely Lazzies?",
      a: "Yes — this is a valid syllogism (deductive reasoning).<br><br>Formally: A ⊆ B (all Bloops ∈ Razzies) and B ⊆ C (all Razzies ∈ Lazzies), therefore A ⊆ C (all Bloops ∈ Lazzies) by transitivity.<br><br>This is the same logical structure used in: set theory (subsets), OOP type hierarchies (if Dog is Animal and Animal is LivingThing, then Dog is LivingThing), and database query optimization (transitive closure).<br><br>Answer: Yes, all Bloops are definitely Lazzies.",
      mk: "A⊆B, B⊆C → A⊆C (transitivity) | Same structure as OOP inheritance | Answer: YES" },
    { q: "A clock shows 3:15. What is the exact angle between the hour and minute hands?",
      a: "Minute hand at 3:15 = exactly at 15 min mark = <strong>90°</strong> (pointing to 3).<br><br>Hour hand: at 3:00 it's at 90°. By 3:15 it has moved 15/60 × 30° = <strong>7.5°</strong> past the 3.<br>Hour hand position = 90° + 7.5° = 97.5°<br><br>Angle between hands = |97.5° − 90°| = <strong>7.5°</strong><br><br>General formula: |30H − 5.5M| where H = hour, M = minutes.<br>|30×3 − 5.5×15| = |90 − 82.5| = 7.5°<br><br>For minimum angle: if result > 180°, use 360° − result.",
      mk: "Formula: |30H - 5.5M| | 3:15 → |90-82.5| = 7.5° | Hour hand moves 0.5°/min | Minute hand moves 6°/min" },
    { q: "What comes next? 2, 6, 12, 20, 30, 42, ___",
      a: "Method 1 — Differences: 4, 6, 8, 10, 12 → differences increase by 2. Next difference = 14. Answer = 42 + 14 = <strong>56</strong>.<br><br>Method 2 — Formula: n(n+1):<br>1×2=2, 2×3=6, 3×4=12, 4×5=20, 5×6=30, 6×7=42, 7×8=<strong>56</strong>.<br><br>Pattern recognition strategy: first look at differences between terms. If not obvious, look at second differences. Also try: ratios, products, squares, n(n+1) formula.",
      mk: "Differences: 4,6,8,10,12,→14 | Formula n(n+1) | Strategy: differences → second differences → ratios | Answer: 56" },
    { q: "8 identical balls, one is heavier. Find the heavy one using a balance scale in exactly 2 weighings.",
      a: "Divide 8 balls into groups: <strong>A(3), B(3), C(2)</strong>.<br><br><strong>Weighing 1</strong>: Weigh group A vs group B.<br><br><strong>Case 1 — They balance</strong>: heavy ball is in group C (2 balls).<br>Weighing 2: Weigh one vs one → heavier side wins.<br><br><strong>Case 2 — One side heavier</strong>: heavy ball is in that group of 3.<br>Weighing 2: Take 2 balls from heavy group, weigh 1 vs 1.<br>• One heavier → that's it.<br>• They balance → it's the 3rd ball not weighed.<br><br>Key insight: 2 weighings can distinguish up to 3² = 9 balls.",
      mk: "3-3-2 split | Each weighing gives 3 outcomes (left, right, balance) | 2 weighings = 3²=9 distinguishable outcomes" },
    { q: "What is the probability of getting at least one 6 when rolling two fair dice?",
      a: "Use the complement: P(at least one 6) = 1 − P(no 6 on either die).<br><br>P(no 6 on one die) = 5/6<br>P(no 6 on both dice) = 5/6 × 5/6 = 25/36<br><br>P(at least one 6) = 1 − 25/36 = <strong>11/36 ≈ 0.306 = 30.6%</strong><br><br>Direct count: 11 favorable outcomes — (6,1),(6,2),(6,3),(6,4),(6,5),(6,6),(1,6),(2,6),(3,6),(4,6),(5,6) = 11.<br><br>Rule: for 'at least one' problems, <strong>always use complement</strong> — it's always simpler.",
      mk: "P(at least one) = 1 - P(none) | 1 - (5/6)² = 11/36 | Complement rule is always simpler for 'at least one'" },
    { q: "How would you estimate the number of AI engineers currently working in Bangladesh? (Fermi estimation)",
      a: "Break into components (show your reasoning — that's what's evaluated):<br><br>Population of Bangladesh: ~170M<br>Working-age urban population: ~30M<br>University graduates: ~5% = 1.5M<br>STEM graduates: ~15% of grads = 225,000/year graduating, ~1M active in workforce<br>Computer science/EE related: ~25% = 250,000<br>Software engineers total: ~150,000 (Bangladesh has a growing tech sector)<br>AI/ML specifically: ~5% = ~7,500<br>Adjust for BJIT and similar AI-focused companies: perhaps 5,000–10,000<br><br><strong>Answer: order of magnitude ~5,000–10,000</strong>. Show all assumptions clearly.",
      mk: "Fermi estimation: break down → estimate each step → multiply → sanity check | Structure and reasoning matter more than exact answer" },
    { q: "You have 100 doors all closed. You toggle every door (open closed). Then toggle every 2nd door. Then every 3rd... up to 100th. Which doors are open at the end?",
      a: "Doors that are toggled an <strong>odd number of times</strong> end up open.<br><br>A door n is toggled once for each divisor of n (toggle door n when counter divides n).<br><br>Most numbers have an even number of divisors (divisors come in pairs: if d|n then n/d also divides n).<br><br>Exception: <strong>perfect squares</strong> have an odd number of divisors (middle divisor √n pairs with itself).<br><br>Perfect squares from 1–100: 1, 4, 9, 16, 25, 36, 49, 64, 81, 100 → <strong>10 doors open</strong>.<br><br>Classic puzzle testing mathematical insight, not brute force.",
      mk: "Answer: 10 doors open | Only perfect squares (1,4,9,16,25,36,49,64,81,100) | Key insight: perfect squares have odd number of divisors" }
  ]}
];

let learnedSet = JSON.parse(localStorage.getItem('bjit_learned') || '[]');
let learnedMap = new Set(learnedSet);
let openCards = new Set();

function totalQ() { return TOPICS.reduce((s,t)=>s+t.qs.length,0); }

function saveProgress() {
  try { localStorage.setItem('bjit_learned', JSON.stringify([...learnedMap])); } catch(e){}
}

function updateProgress() {
  const done = learnedMap.size;
  const total = totalQ();
  const pct = Math.round(done/total*100);
  document.getElementById('prog-fill').style.width = pct+'%';
  document.getElementById('prog-text').textContent = done+' / '+total;
}

function buildSidebar() {
  const sb = document.getElementById('sidebar');
  sb.innerHTML = '<div class="sidebar-label">Topics</div>';
  TOPICS.forEach(t => {
    const learned = t.qs.filter((_,qi) => learnedMap.has(t.id+'-'+qi)).length;
    const div = document.createElement('div');
    div.className = 'nav-item';
    div.id = 'nav-'+t.id;
    div.innerHTML = `<span class="nav-dot" style="background:${t.color}"></span>
      <span>${t.label}</span>
      <span class="nav-count">${t.qs.length}q</span>
      ${learned>0?`<span class="nav-learned">${learned}✓</span>`:''}`;
    div.addEventListener('click', () => {
      document.getElementById('sec-'+t.id)?.scrollIntoView({behavior:'smooth'});
    });
    sb.appendChild(div);
  });
}

function cardKey(tid, qi) { return tid+'-'+qi; }

function buildMain(filter) {
  const main = document.getElementById('main');
  main.innerHTML = '';

  if (!filter) {
    const hero = document.createElement('div');
    hero.className = 'hero';
    const totalDone = learnedMap.size;
    const total = totalQ();
    hero.innerHTML = `
      <div class="hero-title">Master Every Question. <span>Top 1% guaranteed.</span></div>
      <div class="hero-sub">Comprehensive Q&A compiled by an expert Senior AI Engineer + Examiner. Study these ${total} questions across 9 exam topics and you'll have complete coverage.</div>
      <div class="stats-row">
        <div class="stat-box"><div class="stat-num">${total}</div><div class="stat-lbl">Total Q&A</div></div>
        <div class="stat-box"><div class="stat-num">9</div><div class="stat-lbl">Topics</div></div>
        <div class="stat-box"><div class="stat-num">${totalDone}</div><div class="stat-lbl">Learned</div></div>
        <div class="stat-box"><div class="stat-num">${total-totalDone}</div><div class="stat-lbl">Remaining</div></div>
      </div>`;
    main.appendChild(hero);
  }

  let anyVisible = false;

  TOPICS.forEach(t => {
    const filteredQs = filter
      ? t.qs.map((q,i)=>({...q,i})).filter(q => q.q.toLowerCase().includes(filter.toLowerCase()) || q.a.toLowerCase().includes(filter.toLowerCase()))
      : t.qs.map((q,i)=>({...q,i}));

    if (filteredQs.length === 0) return;
    anyVisible = true;

    const sec = document.createElement('div');
    sec.className = 'topic-section';
    sec.id = 'sec-'+t.id;

    const hdr = document.createElement('div');
    hdr.className = 'topic-header';
    const learnedCount = t.qs.filter((_,qi) => learnedMap.has(t.id+'-'+qi)).length;
    hdr.innerHTML = `
      <div class="topic-icon" style="background:${t.bg}">${t.icon}</div>
      <div>
        <div class="topic-title">${t.label}</div>
        <div class="topic-meta">${t.qs.length} questions · ${learnedCount} mastered</div>
      </div>
      <span class="topic-pill" style="background:${t.bg};color:${t.color};border:1px solid ${t.color}33">${t.pill}</span>`;
    sec.appendChild(hdr);

    filteredQs.forEach(qObj => {
      const qi = qObj.i;
      const key = cardKey(t.id, qi);
      const isOpen = openCards.has(key);
      const isLearned = learnedMap.has(key);

      const card = document.createElement('div');
      card.className = 'qa-card'+(isOpen?' open':'')+(isLearned?' learned':'');
      card.id = 'card-'+key;

      card.innerHTML = `
        <div class="qa-question">
          <span class="q-num">Q${qi+1}</span>
          <span class="q-text">${qObj.q}</span>
          <div class="q-right">
            <button class="learn-btn${isLearned?' done':''}" data-key="${key}">${isLearned?'✓ Mastered':'Mark mastered'}</button>
            <span class="chevron">▼</span>
          </div>
        </div>
        <div class="qa-answer">
          <div class="answer-text">${qObj.a}</div>
          ${qObj.mk ? `<div class="must-know"><strong>⚡ Exam must-know:</strong> ${qObj.mk}</div>` : ''}
        </div>`;

      card.querySelector('.qa-question').addEventListener('click', (e) => {
        if (e.target.closest('.learn-btn')) return;
        if (openCards.has(key)) openCards.delete(key);
        else openCards.add(key);
        card.classList.toggle('open');
      });

      card.querySelector('.learn-btn').addEventListener('click', (e) => {
        e.stopPropagation();
        if (learnedMap.has(key)) learnedMap.delete(key);
        else learnedMap.add(key);
        saveProgress();
        card.classList.toggle('learned', learnedMap.has(key));
        card.querySelector('.learn-btn').className = 'learn-btn'+(learnedMap.has(key)?' done':'');
        card.querySelector('.learn-btn').textContent = learnedMap.has(key)?'✓ Mastered':'Mark mastered';
        updateProgress();
        buildSidebar();
        document.querySelector('.stat-box:nth-child(3) .stat-num').textContent = learnedMap.size;
        document.querySelector('.stat-box:nth-child(4) .stat-num').textContent = totalQ()-learnedMap.size;
        document.querySelector('.stat-lbl').parentElement.querySelectorAll('.stat-num')[2] && (document.querySelectorAll('.stat-num')[2].textContent = learnedMap.size);
      });

      sec.appendChild(card);
    });

    main.appendChild(sec);
  });

  if (!anyVisible) {
    main.innerHTML = '<div class="no-results">No questions match your search.</div>';
  }
}

function doSearch(val) {
  buildMain(val.trim() || null);
}

// Sidebar active highlight on scroll
function onScroll() {
  const sections = document.querySelectorAll('.topic-section');
  let current = null;
  sections.forEach(s => {
    if (s.getBoundingClientRect().top < 120) current = s.id.replace('sec-','');
  });
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  if (current) document.getElementById('nav-'+current)?.classList.add('active');
}

document.querySelector('.main')?.addEventListener('scroll', onScroll);

buildSidebar();
buildMain(null);
updateProgress();
</script>
</body>
</html>
